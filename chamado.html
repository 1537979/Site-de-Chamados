<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Abertura de Chamados</title>
</head>
<body>

  <h1>Abertura de Chamado</h1>

  <input id="nome" placeholder="Nome"><br><br>
  <input id="email" placeholder="Email"><br><br>
  <select id="tipo">
    <option value="">Tipo</option>
    <option value="Queda de Conexão">Queda de Conexão</option>
    <option value="Suspensão de Linha">Suspensão de Linha</option>
    <option value="Habilitação de SMS">Habilitação de SMS</option>
    <option value="Troca de ICCID">Troca de ICCID</option>
    <option value="Cancelamento de Linha">Cancelamento de Linha</option>
    <option value="Instabilidade na Plataforma">Instabilidade na Plataforma</option>
    <option value="Reset">Reset</option>
    <option value="Informações Gerais">Informações Gerais</option>
    <option value="Outro">Outro</option>
  </select><br><br>
  <select id="prioridade">
    <option value="">Prioridade</option>
    <option value="Alta">Alta</option>
    <option value="Media">Média</option>
    <option value="Baixa">Baixa</option>
  </select><br><br>
  <select id="operadora">
    <option value="">Operadora</option>
    <option value="Vivo">Vivo</option>
    <option value="Claro">Claro</option>
    <option value="Arqia">Arqia</option>
    <option value="Emnify">Emnify</option>
    <option value="Tim">Tim</option>
    <option value="NLT">NLT</option>
    <option value="Eseye">Eseye</option>
  </select><br><br>
  <input id="assunto" placeholder="Assunto"><br><br>
  <textarea id="descricao"></textarea><br><br>
  <input id="copia" placeholder="Email em Cópia"><br><br>

  <button onclick="enviar()">Enviar</button>

  <script src="chamado.js"></script>
</body>
</html>
