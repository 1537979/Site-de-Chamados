<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Abertura de Chamados</title>
  <!--Link CSS-->
  <link rel="stylesheet" href="chamado.css">
  <!--Link para fonte-->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@100..1000&display=swap" rel="stylesheet">
</head>

<body>

<!--CABEÇALHO-->
<header class="gt-header">
  <div class="gt-logo-wrap">
    <img src="/src/logo-getrak.png" alt="logo">
  </div>

  <nav class="gt-nav">
    <a href="#" class="active">Chamados</a>
    <a href="#">Dashnoard</a>
  </nav>

  <div class="gt-right">
    <span class="gt-badge">Pro</span>
    <div class="gt-divider"></div>
    <button class="gt-icon-btn" aria-label="Notificações">🔔</button>
    <button class="gt-icon-btn" aria-label="Configurações">⚙️</button>
    <div class="gt-divider"></div>
    <div class="gt-avatar">JS</div>
  </div>
</header>

   <!-- CONTEÚDO -->
  <main class="container">

    <div class="titulo-area">

      <h1>Cadastrar Novo Chamado</h1>

    </div>

    <!--CARD-->
    <div class="card">

      <!-- TIPO -->
      <div class="form-group">

        <label>Tipo</label>

        <select id="tipo">
          <option value="">- Selecione -</option>
          <option value="Queda de Conexão">Queda de Conexão</option>
          <option value="Suspensão de Linha">Suspensão de Linha</option>
          <option value="Habilitação de SMS">Habilitação de SMS</option>
          <option value="Troca de ICCID">Troca de ICCID</option>
          <option value="Cancelamento de Linha">Cancelamento de Linha</option>
          <option value="Instabilidade na Plataforma">Instabilidade na Plataforma</option>
          <option value="Reset">Reset</option>
          <option value="Outro">Outros</option>
        </select>
        <span class="field-error" id="erro-tipo">Campo obrigatório</span>

      </div>

      <!-- PRIORIDADE -->
      <div class="form-group">

        <label>Prioridade</label>

        <select id="prioridade">
          <option value="">- Selecione -</option>
          <option value="Baixa">Baixa</option>
          <option value="Media">Média</option>
          <option value="Alta">Alta</option>
        </select>
        <span class="field-error" id="erro-prioridade">Campo obrigatório</span>

      </div>

      <!-- OPERADORA -->
      <div class="form-group">

        <label>Operadora</label>

        <select id="operadora">
          <option value="">- Selecione -</option>
          <option value="Vivo">Vivo</option>
          <option value="Claro">Claro</option>
          <option value="Arqia">Arqia</option>
          <option value="Emnify">Emnify</option>
          <option value="Tim">Tim</option>
          <option value="NLT">NLT</option>
          <option value="Eseye">Eseye</option>
        </select>
        <span class="field-error" id="erro-operadora">Campo obrigatório</span>

      </div>

      <!-- ASSUNTO -->
      <div class="form-group">

        <label>Assunto</label>

        <input
          type="text"
          id="assunto"
          placeholder="Assunto do chamado">
        <span class="field-error" id="erro-assunto">Campo obrigatório</span>

      </div>

      <!-- EMAIL CÓPIA -->
      <div class="form-group">

        <label>Enviar Cópia</label>

        <input
          type="email"
          id="copia"
          placeholder="Digite o email">
        <span class="field-error" id="erro-copia">Campo obrigatório</span>

      </div>

      <!-- MENSAGEM -->
      <div class="form-group">

        <label>Mensagem</label>

        <textarea
          id="mensagem"
          placeholder="Descreva aqui o seu chamado"></textarea>
        <span class="field-error" id="erro-mensagem">Campo obrigatório</span>

      </div>

      <!-- ANEXO -->
      <div class="form-group">

        <label>Anexar Arquivo</label>

        <input
          type="file"
          id="anexo"
          accept=".pdf,.txt,.png,.jpg,.jpeg">
      </div>

      <!-- BOTÃO ENVIAR -->
      <button class="btn-enviar" onclick="enviar()">

        Criar Chamado

      </button>

    </div>

  </main>

  <!--JAVA SCRIPT-->
  <script src="chamado.js"></script>

</body>
</html>
